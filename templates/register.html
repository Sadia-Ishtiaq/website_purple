{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="max-w-md w-full">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="{{ url_for('index') }}" class="inline-flex items-center gap-2">
                <div class="gradient-bg text-white p-3 rounded-xl">
                    <i class="fa-solid fa-brain text-2xl"></i>
                </div>
                <span class="font-bold text-2xl text-white">NeuroScan<span class="text-purple-400">AI</span></span>
            </a>
        </div>

        <!-- Register Card -->
        <div class="bg-[#1e293b] rounded-2xl shadow-xl p-8 border border-purple-500/20">
            <h2 class="text-2xl font-bold text-white mb-2 text-center">Create Account</h2>
            <p class="text-gray-400 text-center mb-8">Join us for AI-powered diagnosis</p>

            <form method="POST" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Full Name</label>
                    <input type="text" name="name" required
                        class="w-full px-4 py-3 bg-[#0f172a] border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Email Address</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-3 bg-[#0f172a] border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Password</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-3 bg-[#0f172a] border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2">Confirm Password</label>
                    <input type="password" name="confirm_password" required
                        class="w-full px-4 py-3 bg-[#0f172a] border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500">
                </div>

                <button type="submit"
                    class="w-full gradient-bg text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition transform hover:-translate-y-1">
                    Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-400">
                    Already have an account?
                    <a href="{{ url_for('login') }}" class="text-purple-400 font-semibold hover:text-purple-300">
                        Sign in
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
